    ports:
      - "6382:6379"
    volumes:
      - ./data/6382:/data

  redis-shard-4:
    <<: *redis_base
    container_name: redis-6383
    networks:
      redis_cluster_net:
        ipv4_address: 172.25.0.13
    ports:
      - "6383:6379"
    volumes:
      - ./data/6383:/data

  redis-shard-5:
    <<: *redis_base
    container_name: redis-6384
    networks:
      redis_cluster_net:
        ipv4_address: 172.25.0.14
    ports:
      - "6384:6379"
    volumes:
      - ./data/6384:/data

  redis-shard-6:
    <<: *redis_base
    container_name: redis-6385
