version: '3.8'

services:
  redis-shard-1: &redis_base
    build: .
    container_name: redis-6380
    networks:
      redis_cluster_net:
        ipv4_address: 172.25.0.10
    ports:
      - "6380:6379"
    volumes:
      - ./data/6380:/data

  redis-shard-2:
    <<: *redis_base
    container_name: redis-6381
    networks:
      redis_cluster_net:
        ipv4_address: 172.25.0.11
    ports:
      - "6381:6379"
    volumes:
      - ./data/6381:/data

  redis-shard-3:
    <<: *redis_base
    container_name: redis-6382
    networks:
      redis_cluster_net:
